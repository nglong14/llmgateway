server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: [localhost]
        labels:
          job: gateway
          compose_service: gateway
          __path__: /var/log/gateway/*.log
